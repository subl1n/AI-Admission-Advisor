<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
background:#f5f7fb;
font-family:Inter,sans-serif;
}

.card{
border:none;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
margin-bottom:20px;
}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="/">AI Admission Advisor</a>

<div>

<a href="/" class="btn btn-outline-light me-2">Home</a>
<a href="/history" class="btn btn-outline-light me-2">History</a>
<a href="/about" class="btn btn-outline-light">About</a>

</div>

</div>

</nav>

<div class="container mt-5">

<h2 class="mb-4 fw-bold">

Application History

</h2>

{% for app in applications %}

<div class="card p-4">

<h4>{{ app.universities }}</h4>

<p><strong>GPA:</strong> {{ app.gpa }}</p>

<p><strong>IELTS:</strong> {{ app.ielts }}</p>

<p><strong>SAT:</strong> {{ app.sat }}</p>

<p><strong>Portfolio:</strong><br>{{ app.portfolio }}</p>

<a href="/application/{{ loop.index0 }}" class="btn btn-primary">
    View AI Analysis
</a>

</div>

{% endfor %}

</div>

</body>

</html>
