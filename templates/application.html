<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Application</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card p-5">

        <h2>{{ application.universities }}</h2>

        <hr>

        <p><strong>GPA:</strong> {{ application.gpa }}</p>

        <p><strong>IELTS:</strong> {{ application.ielts }}</p>

        <p><strong>SAT:</strong> {{ application.sat }}</p>

        <p><strong>Portfolio:</strong></p>

        <p>{{ application.portfolio }}</p>

        <hr>

        <h3>AI Analysis</h3>

        <div>
            {{ application.analysis | safe }}
        </div>

        <hr>

        <a href="/history" class="btn btn-primary">
            Back to History
        </a>

    </div>

</div>

</body>
</html>
