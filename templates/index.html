<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Admission Advisor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>

        body{
            font-family: Inter, sans-serif;
            background:#f5f7fb;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.08);
        }

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="/">AI Admission Advisor</a>

<div>

<a class="btn btn-outline-light me-2" href="/">Home</a>

<a class="btn btn-outline-light me-2" href="/history">History</a>

<a class="btn btn-outline-light" href="/about">About</a>

</div>

</div>

</nav>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card p-5">

<h1 class="fw-bold mb-3">
AI Admission Advisor
</h1>

<p class="text-muted mb-4">
Analyze your chances of admission using AI.
</p>

<form action="/analyze" method="post">

<div class="mb-3">

<label class="form-label">
GPA
</label>

<input
class="form-control"
name="gpa"
required>

</div>

<div class="mb-3">

<label class="form-label">
IELTS
</label>

<input
class="form-control"
name="ielts"
required>

</div>

<div class="mb-3">

<label class="form-label">
SAT
</label>

<input
class="form-control"
name="sat">

</div>

<div class="mb-3">

<label class="form-label">
Portfolio
</label>

<textarea
class="form-control"
rows="5"
name="portfolio"></textarea>

</div>

<div class="mb-4">

<label class="form-label">
Universities
</label>

<textarea
class="form-control"
rows="2"
name="universities"></textarea>

</div>

<button
class="btn btn-primary btn-lg w-100">

Analyze Profile

</button>

</form>

</div>

</div>

</div>

</div>

</body>

</html>
